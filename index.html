<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NaviCav - Reset Password</title>
    <!-- Use Tailwind CSS for rapid styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-text {
            background: linear-gradient(90deg, #2976BB 0%, #A1C935 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-gradient {
            background: linear-gradient(90deg, #2976BB 0%, #3366FF 100%);
        }
        .btn-gradient:hover {
            box-shadow: 0 4px 14px 0 rgba(51, 102, 255, 0.39);
        }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8 text-center">
        <!-- Logo -->
        <div class="mb-4 flex justify-center">
            <img src="logo.png" alt="NaviCav Logo" class="w-20 h-20 object-contain">
        </div>

        <h1 class="text-3xl font-bold mb-2 gradient-text">NaviCav</h1>
        <h2 class="text-xl font-semibold text-gray-800 mb-6">Create New Password</h2>

        <!-- Status Message -->
        <div id="message" class="hidden mb-4 p-3 rounded-lg text-sm font-medium"></div>

        <!-- Form -->
        <form id="reset-form" class="space-y-4 text-left">
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                <input type="password" id="password" required minlength="6" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors"
                    placeholder="At least 6 characters">
            </div>
            
            <button type="submit" id="submit-btn" 
                class="w-full btn-gradient text-white font-semibold py-3 px-4 rounded-lg transition-all duration-200">
                Update Password
            </button>
        </form>

        <div id="success-state" class="hidden mt-6">
            <p class="text-green-600 font-medium mb-4">Password reset successfully!</p>
            <p class="text-gray-600 mb-6">You can now safely close this window and log in to the NaviCav mobile app with your new password.</p>
        </div>
    </div>

<script>
    const SUPABASE_URL = 'https://sizrlyuzmhfeesjjyzuj.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNpenJseXV6bWhmZWVzamp5enVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI5MjAxNTAsImV4cCI6MjA3ODQ5NjE1MH0.RKuhHLL7ZYT6Y97ulYMaEaTiyU-nnR2G3NKzMefX_J0';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('reset-form');
    const submitBtn = document.getElementById('submit-btn');
    const messageEl = document.getElementById('message');
    const successState = document.getElementById('success-state');

    function showMessage(text, isError) {
        messageEl.textContent = text;
        messageEl.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'bg-green-100', 'text-green-700');
        messageEl.classList.add(
            isError ? 'bg-red-100' : 'bg-green-100',
            isError ? 'text-red-700' : 'text-green-700'
        );
    }

    async function initSession() {
        // Hide form until we confirm a valid recovery session
        form.classList.add('hidden');
        showMessage('Verifying your reset link...', false);

        // PKCE flow: Supabase v2 sends ?code= in the URL
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');

        if (code) {
            const { error } = await supabase.auth.exchangeCodeForSession(code);
            if (error) {
                showMessage('This reset link has expired or already been used. Please request a new one.', true);
                return;
            }
        }

        // Listen for the PASSWORD_RECOVERY event (covers both PKCE and implicit flows)
        supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'PASSWORD_RECOVERY' || (event === 'SIGNED_IN' && session)) {
                messageEl.classList.add('hidden');
                form.classList.remove('hidden');
            }
        });

        // Fallback: check if session already exists (implicit flow sets it immediately)
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            messageEl.classList.add('hidden');
            form.classList.remove('hidden');
        } else if (!code) {
            // No code in URL and no session = invalid/expired link
            showMessage('This reset link has expired or already been used. Please request a new one.', true);
        }
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const newPassword = document.getElementById('password').value;

        submitBtn.disabled = true;
        submitBtn.textContent = 'Updating...';
        submitBtn.classList.add('opacity-70');

        try {
            const { error } = await supabase.auth.updateUser({ password: newPassword });
            if (error) throw error;

            form.classList.add('hidden');
            successState.classList.remove('hidden');
            messageEl.classList.add('hidden');

        } catch (error) {
            console.error(error);
            showMessage(error.message || 'Failed to update password. The link may have expired.', true);
            submitBtn.disabled = false;
            submitBtn.textContent = 'Update Password';
            submitBtn.classList.remove('opacity-70');
        }
    });

    initSession();
</script>

</body>
</html>
